<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Game Vault</title>
  <link rel="stylesheet" href="assets/styles.css">

  <style>
    .is-hidden { display: none; }
  </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="topbar">
  <div>
    <p class="eyebrow">Admin panel</p>
    <h1>Upload Berkas</h1>
  </div>
  <nav>
    <a href="index.html">Lihat Web</a>
  </nav>
</header>

<!-- ================= MAIN ================= -->
<main class="admin-layout">

  <!-- ========= LOGIN ========= -->
  <section class="panel login-panel" id="login-panel">
    <h2>Login Admin</h2>
    <form id="login-form">
      <input id="admin-id" placeholder="admin" required>
      <input id="admin-password" type="password" placeholder="password" required>
      <button class="primary">Masuk</button>
    </form>
    <pre id="login-status"></pre>
  </section>

  <!-- ========= CONTENT ========= -->
  <div id="admin-content" class="is-hidden">

    <!-- ===== UPLOAD ===== -->
    <section class="panel">
      <h2>Upload Berkas</h2>

      <form id="upload-form">

        <!-- CATEGORY -->
        <label>
          Kategori
          <select id="category">
            <option value="documents">Document</option>
            <option value="scripts">Script</option>
            <option value="games">Game</option>
          </select>
        </label>

        <!-- TITLE -->
        <label>
          Nama
          <input id="title" required>
        </label>

        <!-- FILE -->
        <label id="file-group">
          File
          <input id="file" type="file">
        </label>

        <!-- SCRIPT INPUT -->
        <div id="script-group" class="is-hidden">
          <label>
            Code Script
            <textarea id="script-code" rows="10"
              placeholder="Tulis script C# di sini..."></textarea>
          </label>
        </div>

        <!-- DESC -->
        <label>
          Deskripsi
          <textarea id="description"></textarea>
        </label>

        <button class="primary">Upload</button>

      </form>

      <pre id="status">Siap upload</pre>
    </section>

  </div>

</main>

<script>

// ================= LOGIN =================
document.getElementById("login-form").addEventListener("submit", (e)=>{
  e.preventDefault();

  const id = document.getElementById("admin-id").value;
  const pass = document.getElementById("admin-password").value;

  if(id==="admin" && pass==="admin"){
    document.getElementById("admin-content").classList.remove("is-hidden");
    document.getElementById("login-status").textContent="Login berhasil";
  } else {
    document.getElementById("login-status").textContent="Login gagal";
  }
});

// ================= TOGGLE SCRIPT MODE =================
const category = document.getElementById("category");
const fileGroup = document.getElementById("file-group");
const scriptGroup = document.getElementById("script-group");

category.addEventListener("change", ()=>{
  if(category.value === "scripts"){
    fileGroup.style.display = "none";
    scriptGroup.classList.remove("is-hidden");
  } else {
    fileGroup.style.display = "block";
    scriptGroup.classList.add("is-hidden");
  }
});

// ================= SUBMIT =================
document.getElementById("upload-form").addEventListener("submit",(e)=>{
  e.preventDefault();

  const cat = category.value;
  const title = document.getElementById("title").value;
  const desc = document.getElementById("description").value;

  if(cat === "scripts"){
    const code = document.getElementById("script-code").value;

    console.log("SCRIPT MODE", {title, desc, code});
    document.getElementById("status").textContent = "Script disimpan (dummy)";
  }
  else{
    const file = document.getElementById("file").files[0];

    console.log("FILE MODE", {title, desc, file});
    document.getElementById("status").textContent = "File diupload (dummy)";
  }
});

</script>

</body>
</html>
