<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - Game Vault</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: #fff;
  margin: 0;
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #1a1a1a;
}

.panel {
  background: #1a1a1a;
  padding: 20px;
  margin: 15px;
  border-radius: 10px;
}

button {
  cursor: pointer;
  padding: 8px;
}

.primary {
  background: #4cafef;
  border: none;
  color: white;
}

.script-layout {
  display: grid;
  grid-template-columns: 180px 200px 1fr;
  gap: 10px;
}

.script-sidebar button {
  width: 100%;
  margin-bottom: 5px;
}

.script-list div {
  padding: 8px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.script-list div:hover {
  background: #222;
}

.script-viewer pre {
  background: #111;
  padding: 10px;
  overflow-x: auto;
}
</style>
</head>

<body>

<header class="topbar">
  <h1>Admin Panel</h1>
</header>

<main>

<section class="panel">
  <h2>Login Admin</h2>
  <input id="admin-id" placeholder="admin"><br><br>
  <input id="admin-password" type="password" placeholder="password"><br><br>
  <button class="primary" onclick="login()">Login</button>
  <p id="login-status"></p>
</section>

<div id="admin-content" style="display:none">

<section class="panel">
  <h2>Upload (Dummy)</h2>
  <input placeholder="Nama file"><br><br>
  <input type="file"><br><br>
  <button class="primary">Upload</button>
</section>

<!-- ========================= -->
<!-- SCRIPT EXPLORER -->
<!-- ========================= -->
<section class="panel">
  <h2>Script Explorer</h2>

  <div class="script-layout">
    
    <div id="script-folders" class="script-sidebar"></div>
    <div id="script-list" class="script-list"></div>

    <div class="script-viewer">
      <pre id="script-code">Pilih script...</pre>
      <button id="copy-btn">Copy Code</button>
    </div>

  </div>
</section>

</div>

</main>

<script>
// ================= LOGIN =================
function login() {
  const id = document.getElementById("admin-id").value;
  const pass = document.getElementById("admin-password").value;

  if (id === "admin" && pass === "admin") {
    document.getElementById("admin-content").style.display = "block";
    document.getElementById("login-status").textContent = "Login berhasil";
  } else {
    document.getElementById("login-status").textContent = "Login gagal";
  }
}

// ================= SCRIPT DATA =================
const scriptData = {
  "Movement": [
    {
      name: "Player Movement",
      code: `using UnityEngine;

public class PlayerMove : MonoBehaviour
{
    public float speed = 5f;

    void Update()
    {
        float h = Input.GetAxis("Horizontal");
        transform.Translate(Vector2.right * h * speed * Time.deltaTime);
    }
}`
    }
  ],
  "Enemy": [
    {
      name: "Enemy Patrol",
      code: `using UnityEngine;

public class EnemyPatrol : MonoBehaviour
{
    public float speed = 2f;

    void Update()
    {
        transform.Translate(Vector2.right * speed * Time.deltaTime);
    }
}`
    }
  ],
  "UI": [
    {
      name: "Button Click",
      code: `using UnityEngine;

public class UIButton : MonoBehaviour
{
    public void Click()
    {
        Debug.Log("Clicked");
    }
}`
    }
  ]
};

// ================= SCRIPT EXPLORER =================
const folderContainer = document.getElementById("script-folders");
const listContainer = document.getElementById("script-list");
const codeViewer = document.getElementById("script-code");
const copyBtn = document.getElementById("copy-btn");

// load folder
Object.keys(scriptData).forEach(folder => {
  const btn = document.createElement("button");
  btn.textContent = folder;

  btn.onclick = () => {
    listContainer.innerHTML = "";

    scriptData[folder].forEach(script => {
      const item = document.createElement("div");
      item.textContent = script.name;

      item.onclick = () => {
        codeViewer.textContent = script.code;
      };

      listContainer.appendChild(item);
    });
  };

  folderContainer.appendChild(btn);
});

// copy
copyBtn.onclick = () => {
  navigator.clipboard.writeText(codeViewer.textContent);
  alert("Copied!");
};
</script>

</body>
</html>
