<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Game Vault</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Admin panel</p>
      <h1>Upload Berkas</h1>
    </div>
    <nav>
      <a href="index.html">Lihat Web</a>
    </nav>
  </header>

  <main class="admin-layout">
    <section class="panel is-hidden" id="github-settings">
      <h2>GitHub Pages Upload</h2>
      <p class="hint">Mode ini dipakai saat admin dibuka dari GitHub Pages. Token hanya disimpan di browser kamu, bukan di file project.</p>
      <div class="form-grid">
        <label>
          Owner GitHub
          <input id="owner" type="text" value="rmdep">
        </label>
        <label>
          Nama repo
          <input id="repo" type="text" value="game-vault-web">
        </label>
        <label>
          Branch
          <input id="branch" type="text" value="main">
        </label>
        <label>
          GitHub token
          <input id="token" type="password" placeholder="github_pat_...">
        </label>
      </div>
    </section>

    <section class="panel">
      <h2>Data Berkas</h2>
      <p class="hint" id="upload-mode-note">Upload disimpan ke folder kategori dan otomatis masuk ke daftar utama.</p>
      <form id="upload-form">
        <div class="form-grid">
          <label>
            Kategori
            <select id="category">
              <option value="documents">Document</option>
              <option value="scripts">Script</option>
              <option value="games">File Game</option>
            </select>
          </label>
          <label>
            Nama
            <input id="title" type="text" required placeholder="Nama berkas">
          </label>
          <label>
            File
            <input id="file" type="file" required>
          </label>
        </div>
        <label>
          Deskripsi
          <textarea id="description" rows="5" required placeholder="Jelaskan isi berkas ini"></textarea>
        </label>
        <div id="script-fields" class="script-admin is-hidden">
          <h3>Detail Script</h3>
          <div class="form-grid">
            <label>
              Topik script
              <input id="script-module" type="text" placeholder="Movement Player">
            </label>
            <label>
              Tags
              <input id="script-tags" type="text" placeholder="movement, player, 2d">
            </label>
          </div>
        </div>
        <button class="primary" type="submit">Upload ke Vault</button>
      </form>
      <pre id="status" class="status">Siap upload.</pre>
    </section>
  </main>

  <script src="assets/admin.js"></script>
</body>
</html>
